query GetCharacter(
  $name: String,
  $serverSlug: String,
  $serverRegion: String,
  $difficulty: Int
  ) {
  characterData {
    character(name: $name, serverSlug: $serverSlug, serverRegion: $serverRegion) {
      name
      classID
      server {
        name
        region {
          name
        }
      }
      zoneRankings(difficulty: $difficulty)
    }
  }
}
